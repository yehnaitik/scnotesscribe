<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:340px;background:#080810;color:#e0e0f0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}

.header{padding:14px 16px;background:#0f0f1e;border-bottom:1px solid #1a1a30;display:flex;align-items:center;gap:10px}
.header-logo{width:32px;height:32px;border-radius:9px;overflow:hidden;background:linear-gradient(135deg,#2d1b69,#0d1b4a);flex-shrink:0;box-shadow:0 0 12px rgba(99,102,241,.4)}
.header-logo img{width:100%;height:100%;object-fit:cover}
.header-text{}
.header-name{font-weight:800;font-size:14px;background:linear-gradient(135deg,#818cf8,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.02em}
.header-sub{font-size:10px;color:#3a3a60;text-transform:uppercase;letter-spacing:.06em}

.file-list{max-height:240px;overflow-y:auto;padding:8px}
.file-list::-webkit-scrollbar{width:4px}
.file-list::-webkit-scrollbar-thumb{background:#1e1e3a;border-radius:2px}

.file-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:background .12s;margin-bottom:2px}
.file-item:hover{background:#0f0f22}

.file-icon{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.file-icon.pdf{background:linear-gradient(135deg,#7f1d1d,#dc2626);color:#fff}
.file-icon.doc{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff}
.file-icon.img{background:linear-gradient(135deg,#1a3a1a,#16a34a);color:#fff}
.file-icon.other{background:linear-gradient(135deg,#2d1b69,#7c3aed);color:#fff}

.file-info{flex:1;min-width:0}
.file-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#e0e0f0}
.file-type{font-size:10.5px;color:#3a3a60;margin-top:1px}

.open-arrow{font-size:14px;color:#2a2a4a;flex-shrink:0}
.file-item:hover .open-arrow{color:#6366f1}

.empty{padding:24px 16px;text-align:center;color:#2a2a4a;font-size:12.5px;line-height:1.6}
.empty .icon{font-size:28px;margin-bottom:8px;opacity:.5}

.divider{height:1px;background:#1a1a30;margin:0 10px}

.actions{padding:10px 10px 8px;display:flex;gap:8px}
.action-btn{flex:1;height:36px;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .14s}
.action-btn.rescan{background:#141428;color:#a0a8cc;border:1px solid #1e1e3a}
.action-btn.rescan:hover{background:#1e1e3a;color:#e0e0f0}
.action-btn.notes{background:linear-gradient(135deg,#4338ca,#6366f1);color:#fff}
.action-btn.notes:hover{opacity:.9}

.footer{padding:6px 12px 8px;display:flex;justify-content:flex-end}
.footer span{font-size:9.5px;color:#1a1a30;font-weight:500}

.update-banner{display:none;margin:8px 10px 0;padding:9px 12px;background:linear-gradient(135deg,#1e1040,#2d1b69);border:1px solid #4338ca;border-radius:9px;gap:8px;align-items:center}
.update-banner.visible{display:flex}
.update-dot{width:7px;height:7px;border-radius:50%;background:#818cf8;flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.update-text{flex:1;font-size:11px;color:#a5b4fc;font-weight:600;line-height:1.3}
.update-dl{font-size:10.5px;padding:4px 10px;background:#4338ca;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:700;flex-shrink:0;text-decoration:none;display:inline-block}
.update-dl:hover{background:#6366f1}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo"><img src="icon.png" alt="logo" onerror="this.style.display='none'"></div>
  <div class="header-text">
    <div class="header-name">SHADOWCORE</div>
    <div class="header-sub">Studyink — File Detector</div>
  </div>
</div>

<div class="update-banner" id="update-banner">
  <div class="update-dot"></div>
  <div class="update-text">New update available!<br><span style="font-weight:400;font-size:10px;color:#6366f1" id="update-msg"></span></div>
  <a class="update-dl" href="https://raw.githubusercontent.com/yehnaitik/scnotesscribe/main/shadowcore-studyink-v2.zip" target="_blank" id="update-dl-btn">Download</a>
</div>

<div class="file-list" id="file-list">
  <div class="empty"><div class="icon">🔍</div><p>Scanning page for files…</p></div>
</div>

<div class="divider"></div>

<div class="actions">
  <button class="action-btn rescan" id="rescan">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    Rescan
  </button>
  <button class="action-btn notes" id="generate-notes">
    ✍️ Generate Notes
  </button>
</div>

<div class="footer"><span>made by yeh.naitik</span></div>

<script src="popup.js"></script>
</body>
</html>
