<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadowcore Studyink Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:#080810;color:#e0e0f0}

/* ── Toolbar ── */
.toolbar{height:52px;background:#0f0f1e;border-bottom:1px solid #1a1a30;display:flex;align-items:center;padding:0 10px;gap:4px;z-index:100;position:relative;flex-shrink:0}
.brand{display:flex;align-items:center;gap:8px;margin-right:8px;padding-right:10px;border-right:1px solid #1a1a30;flex-shrink:0}
.brand-logo{width:28px;height:28px;border-radius:7px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2d1b69,#0d1b4a);box-shadow:0 0 10px rgba(99,102,241,.4)}
.brand-logo img{width:100%;height:100%;object-fit:cover}
.brand-text{display:flex;flex-direction:column;line-height:1.1}
.brand-name{font-weight:800;font-size:12px;background:linear-gradient(135deg,#818cf8,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.02em}
.brand-sub{font-size:9px;color:#4a5580;letter-spacing:.05em;text-transform:uppercase}
.sep{width:1px;height:26px;background:#1a1a30;margin:0 2px;flex-shrink:0}
.spacer{flex:1}

.btn{height:32px;padding:0 9px;border:none;border-radius:6px;background:#141428;color:#a0a8cc;font-size:11.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .12s,color .12s;white-space:nowrap;flex-shrink:0}
.btn:hover{background:#1e1e3a;color:#e0e0f0}
.btn.active{background:#312e81;color:#a5b4fc}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn.icon-only{padding:0;width:32px;justify-content:center}
.btn.danger:hover{background:#7f1d1d;color:#fca5a5}

.page-nav{display:flex;align-items:center;gap:3px}
.page-input{width:40px;height:28px;background:#141428;border:1px solid #1e1e3a;border-radius:5px;color:#e0e0f0;font-size:12px;text-align:center;outline:none}
.page-input:focus{border-color:#6366f1}
.page-total{font-size:11px;color:#4a5580}

.zoom-group{display:flex;align-items:center;gap:2px}
.zoom-label{font-size:11.5px;color:#6366f1;min-width:44px;text-align:center;cursor:pointer;padding:4px 5px;border-radius:5px;font-weight:600}
.zoom-label:hover{background:#141428}

/* ── Layout ── */
.layout{display:flex;height:calc(100% - 52px);position:relative}

/* ── Sidebar ── */
.sidebar{width:130px;flex-shrink:0;background:#0a0a18;border-right:1px solid #1a1a30;overflow-y:auto;display:flex;flex-direction:column;gap:0;padding:8px 6px;transition:width .2s,padding .2s}
.sidebar.hidden{width:0;padding:0;overflow:hidden}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:#1e1e3a;border-radius:2px}
.thumb-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;border-radius:7px;cursor:pointer;transition:background .12s}
.thumb-item:hover{background:#141428}
.thumb-item.active{background:#1a1a40;outline:2px solid #6366f1;outline-offset:1px}
.thumb-canvas{display:block;border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,.5);max-width:102px}
.thumb-ph{background:linear-gradient(90deg,#141428 25%,#1e1e3a 50%,#141428 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:3px}
.thumb-num{font-size:10px;color:#4a5580;font-weight:600}
.thumb-item.active .thumb-num{color:#818cf8}

/* ── Viewer main ── */
.viewer-main{flex:1;min-width:0;overflow:hidden;position:relative;display:flex;flex-direction:column}
.scroll-area{flex:1;overflow-y:auto;overflow-x:auto;display:flex;flex-direction:column;align-items:center;padding:24px 0;gap:16px;background:#080810;position:relative}
.scroll-area::-webkit-scrollbar{width:7px;height:7px}
.scroll-area::-webkit-scrollbar-track{background:#080810}
.scroll-area::-webkit-scrollbar-thumb{background:#1e1e3a;border-radius:4px}
.scroll-area::-webkit-scrollbar-thumb:hover{background:#312e81}

.page-wrapper{position:relative;flex-shrink:0}
.page-canvas{display:block;box-shadow:0 6px 32px rgba(0,0,0,.6);border-radius:3px;background:#fff;transition:opacity .15s}
.page-ph{background:linear-gradient(90deg,#141428 25%,#1e1e3a 50%,#141428 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:3px}

@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ── Draw overlay ── */
.draw-overlay{position:absolute;top:0;left:0;pointer-events:none;display:none;z-index:5}
.draw-overlay.active{display:block;pointer-events:all}

/* ── Status overlay ── */
.status-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;background:rgba(8,8,16,.7);backdrop-filter:blur(4px)}
.status-overlay.hidden{display:none}
.status-card{max-width:380px;width:90%;background:#0f0f22;border:1px solid #1e1e3a;border-radius:16px;padding:28px 24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.status-card.error{border-color:#7f1d1d}
.status-card h2{font-size:15px;font-weight:700;margin-bottom:8px;color:#e0e0f0}
.status-card p{font-size:12.5px;line-height:1.65;color:#6b7db5}
.status-actions{display:none;justify-content:center;gap:10px;margin-top:18px}
.status-card.error .status-actions{display:flex}
.spinner{width:30px;height:30px;border:3px solid #1e1e3a;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Side panels ── */
.side-panel{position:absolute;top:0;right:0;width:260px;height:100%;background:#0f0f22;border-left:1px solid #1a1a30;z-index:20;display:none;flex-direction:column}
.side-panel.open{display:flex}
.panel-header{padding:12px 14px;border-bottom:1px solid #1a1a30;display:flex;justify-content:space-between;align-items:center}
.panel-header h3{font-size:13px;font-weight:700;color:#a5b4fc}
.panel-body{padding:14px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
.panel-section{}
.panel-section label{font-size:10.5px;color:#4a5580;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:6px;font-weight:600}
.panel-section input[type="range"]{width:100%;accent-color:#6366f1;cursor:pointer;height:4px}
.color-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.color-swatch{width:24px;height:24px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:border-color .12s,transform .1s}
.color-swatch:hover,.color-swatch.active{border-color:#fff;transform:scale(1.2)}
.brush-types{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.brush-btn{padding:6px 8px;border-radius:6px;border:1px solid #1e1e3a;background:#141428;color:#a0a8cc;font-size:11px;cursor:pointer;text-align:center;transition:all .12s}
.brush-btn:hover{background:#1e1e3a;color:#e0e0f0}
.brush-btn.active{background:#312e81;border-color:#6366f1;color:#a5b4fc}
.info-row{margin-bottom:8px}
.info-row .lbl{font-size:10px;color:#4a5580;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.info-row .val{font-size:12px;margin-top:3px;word-break:break-all;color:#a0a8cc}
.made-by{position:fixed;bottom:6px;right:8px;font-size:10px;color:#2a2a4a;font-weight:500;z-index:999;letter-spacing:.03em;pointer-events:none}

/* ── Progress ── */
.load-progress{height:2px;background:#6366f1;width:0;transition:width .25s;position:absolute;top:0;left:0;z-index:50;border-radius:0 2px 2px 0;box-shadow:0 0 6px #6366f1}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:#312e81;color:#e0e0f0;padding:9px 18px;border-radius:9px;font-size:12.5px;font-weight:500;z-index:999;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;border:1px solid #4338ca}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="toolbar">
  <div class="brand">
    <div class="brand-logo"><img src="icon.png" alt="logo" onerror="this.style.display='none';this.parentElement.textContent='S'"></div>
    <div class="brand-text">
      <span class="brand-name">SHADOWCORE</span>
      <span class="brand-sub">Studyink</span>
    </div>
  </div>

  <button class="btn icon-only" id="btn-sidebar" title="Toggle Thumbnails">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
  </button>

  <div class="sep"></div>

  <div class="page-nav">
    <button class="btn icon-only" id="btn-prev">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <input class="page-input" id="page-input" type="text" value="1"/>
    <span class="page-total" id="page-total">/ 1</span>
    <button class="btn icon-only" id="btn-next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="sep"></div>

  <div class="zoom-group">
    <button class="btn icon-only" id="btn-zoomout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <span class="zoom-label" id="zoom-label">100%</span>
    <button class="btn icon-only" id="btn-zoomin">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="btn" id="btn-fit">Fit</button>
  </div>

  <div class="sep"></div>

  <!-- Brush tools -->
  <button class="btn" id="btn-draw" title="Pen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Pen
  </button>
  <button class="btn" id="btn-highlight" title="Highlight">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Highlight
  </button>
  <button class="btn" id="btn-eraser" title="Eraser">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-9 8 8-4 4"/></svg>
    Erase
  </button>
  <button class="btn danger" id="btn-clear" title="Clear">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M9 6V4h6v2"/></svg>
  </button>

  <div class="sep"></div>

  <button class="btn" id="btn-download">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download
  </button>

  <div class="spacer"></div>

  <button class="btn icon-only" id="btn-fullscreen" title="Fullscreen (F)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
  </button>
  <button class="btn icon-only" id="btn-info">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
  </button>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>

  <div class="viewer-main" id="viewer-main">
    <div class="load-progress" id="load-progress"></div>
    <div class="scroll-area" id="scroll-area"></div>
    <canvas class="draw-overlay" id="draw-canvas"></canvas>

    <div class="status-overlay" id="status-overlay">
      <div class="status-card" id="status-card">
        <div class="spinner" id="status-spinner"></div>
        <h2 id="status-title">Loading document…</h2>
        <p id="status-desc">Shadowcore is rendering your PDF directly — no Google Viewer, no lag.</p>
        <div class="status-actions">
          <button class="btn" id="btn-open-original">Open Original</button>
          <button class="btn" id="btn-retry">Retry</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Draw panel -->
<div class="side-panel" id="panel-draw">
  <div class="panel-header"><h3>Drawing Tools</h3><button class="btn icon-only" id="close-draw">✕</button></div>
  <div class="panel-body">
    <div class="panel-section">
      <label>Brush Type</label>
      <div class="brush-types">
        <button class="brush-btn active" data-brush="pen">Pen</button>
        <button class="brush-btn" data-brush="marker">Marker</button>
        <button class="brush-btn" data-brush="pencil">Pencil</button>
        <button class="brush-btn" data-brush="calligraphy">Calligraphy</button>
      </div>
    </div>
    <div class="panel-section">
      <label>Size: <span id="size-val">3</span>px</label>
      <input type="range" id="brush-size" min="1" max="30" value="3">
    </div>
    <div class="panel-section">
      <label>Opacity: <span id="opacity-val">100</span>%</label>
      <input type="range" id="brush-opacity" min="10" max="100" value="100">
    </div>
    <div class="panel-section">
      <label>Color</label>
      <div class="color-row">
        <div class="color-swatch active" style="background:#ef4444" data-color="#ef4444"></div>
        <div class="color-swatch" style="background:#f97316" data-color="#f97316"></div>
        <div class="color-swatch" style="background:#eab308" data-color="#eab308"></div>
        <div class="color-swatch" style="background:#22c55e" data-color="#22c55e"></div>
        <div class="color-swatch" style="background:#3b82f6" data-color="#3b82f6"></div>
        <div class="color-swatch" style="background:#8b5cf6" data-color="#8b5cf6"></div>
        <div class="color-swatch" style="background:#ec4899" data-color="#ec4899"></div>
        <div class="color-swatch" style="background:#000000" data-color="#000000"></div>
        <div class="color-swatch" style="background:#ffffff;outline:1px solid #333" data-color="#ffffff"></div>
      </div>
    </div>
  </div>
</div>

<!-- Info panel -->
<div class="side-panel" id="panel-info">
  <div class="panel-header"><h3>File Info</h3><button class="btn icon-only" id="close-info">✕</button></div>
  <div class="panel-body">
    <div class="info-row"><div class="lbl">File Name</div><div class="val" id="info-name">—</div></div>
    <div class="info-row"><div class="lbl">Pages</div><div class="val" id="info-pages">—</div></div>
    <div class="info-row"><div class="lbl">File URL</div><div class="val" id="info-url" style="word-break:break-all;font-size:11px">—</div></div>
  </div>
</div>

<div class="made-by">made by yeh.naitik</div>
<div class="toast" id="toast"></div>

<script type="module" src="viewer.js"></script>
</body>
</html>
